<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Bootstrap 5 JS (for components) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body class="bg-gradient min-vh-100 d-flex align-items-center justify-content-center p-3">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8 col-md-10 col-12">
                <div class="card shadow-lg border-0">
                    <div class="card-header bg-primary text-white text-center py-4">
                        <h1 class="card-title mb-0">📋 Task Manager</h1>
                    </div>
                    <div class="card-body p-4">
                        <div class="input-group mb-4" id="addTaskGroup">
                            <input type="text" class="form-control form-control-lg" id="taskInput"
                                placeholder="Enter a new task..." maxlength="100">
                            <button class="btn btn-primary btn-lg" id="addBtn" type="button">
                                ➕ Add Task
                            </button>
                        </div>
                        <div id="emptyState" class="alert alert-info text-center d-none">
                            <i class="bi bi-check-circle me-2"></i>No tasks yet. Add one to get started!
                        </div>
                        <ul id="taskList" class="list-group list-group-flush"></ul>
                    </div>
                </div>
            </div>
            <script src="script.js"></script>
</body>

</html>
